<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Иконки -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #eaeaea;
        }

        .navbar-brand {
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-link {
            color: #555 !important;
            transition: 0.2s;
        }

        .nav-link:hover {
            color: #000 !important;
        }

        .avatar {
            width: 36px;
            height: 36px;
            font-size: 14px;
            cursor: pointer;
        }

        .search-input {
            border-radius: 20px;
        }

        .btn-search {
            border-radius: 20px;
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">

    <!-- Лого -->
    <a class="navbar-brand" href="/">RIMAD</a>

    <!-- Правая часть -->
    <div class="d-flex align-items-center gap-3 ms-auto">

        <!-- Поиск -->
        <form class="d-flex" role="search" method="get" action="/search">
            <input class="form-control search-input" name="text" type="search" placeholder="Поиск..." />
        </form>

        <!-- Навигация -->
        <a class="nav-link" href="#">Каталог</a>
        <a class="nav-link" href="/shop-cart">
            <i class="bi bi-bag"></i>
        </a>

        {% if not current_user.is_authenticated %}

            <a class="btn btn-outline-dark btn-sm" href="/login">Войти</a>

        {% else %}

        <a href="/profile">
            <div class="rounded-circle bg-dark text-white d-flex justify-content-center align-items-center avatar">
                <i class="bi bi-person-fill"></i>
            </div>
        </a>
            <!-- Выход -->
            <form method="post" action="/logout" class="m-0">
                <button class="btn btn-link nav-link p-0">Выйти</button>
            </form>

        {% endif %}

    </div>

  </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
